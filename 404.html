<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
<meta name="referrer" content="strict-origin-when-cross-origin">

<title>Seite nicht gefunden — social2scale</title>
<link rel="stylesheet" href="/fonts.css">
<noscript><style>#loader{display:none!important}.reveal,.r{opacity:1!important;transform:none!important;animation:none!important}
  </style></noscript>
<style>
  :root{--ink:#000;--paper:#F2F3F1;--muted:#A4A6A1;--emerald:#00B888;--emerald-soft:#1FC998;--emerald-ink:#04201A;--line:rgba(242,243,241,.16);--ease:cubic-bezier(.16,1,.3,1)}
  *{box-sizing:border-box;margin:0;padding:0}
  /* ===== Fix-Dark Hardening — dunkel in JEDEM OS-Modus (Dark-Audit) ===== */
  :root{color-scheme:dark}
  input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus,textarea:-webkit-autofill,select:-webkit-autofill{-webkit-text-fill-color:#F2F3F1;caret-color:#F2F3F1;-webkit-box-shadow:0 0 0 1000px #16161A inset;box-shadow:0 0 0 1000px #16161A inset;transition:background-color 9999s ease-out 0s}
  *{scrollbar-color:#7C7E78 transparent;scrollbar-width:thin}
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-track{background:#000}
  ::-webkit-scrollbar-thumb{background:#2a2a2e;border-radius:7px;border:2px solid #000}
  ::-webkit-scrollbar-thumb:hover{background:#37373c}
  ::selection{background:rgba(0,184,136,.30);color:#F2F3F1}
  body{background:var(--ink);color:var(--paper);font-family:"Hanken Grotesk",system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;
    background-image:radial-gradient(120% 80% at 50% -10%,rgba(0,184,136,.12),transparent 55%)}
  img{height:34px;mix-blend-mode:screen;margin-bottom:34px}
  .logo-s2s{display:none!important}
  @media (max-width:600px){.logo-full{display:none!important}.logo-s2s{display:inline-block!important}}
  .code{font-family:"JetBrains Mono",monospace;font-size:13px;letter-spacing:.3em;color:var(--emerald)}
  h1{font-family:"Fraunces",serif;font-weight:300;font-size:clamp(2rem,1.3rem + 3vw,3.2rem);line-height:1.05;margin-top:14px}
  h1 em{font-style:italic;color:var(--emerald)}
  p{color:var(--muted);margin-top:16px;max-width:42ch}
  a.btn{margin-top:30px;font-family:"Archivo",sans-serif;font-size:14px;font-weight:700;padding:15px 30px;border-radius:9px;text-decoration:none;background:linear-gradient(180deg,var(--emerald-soft),var(--emerald));color:var(--emerald-ink);box-shadow:0 12px 30px -12px rgba(0,184,136,.8);transition:transform .25s var(--ease)}
  a.btn:hover{transform:translateY(-3px)}

  /* ===== Footer (lean · Liquid-Glass) ===== */
  body>img,.code,h1,p,a.btn{flex:0 0 auto}
  .site-footer{position:relative;width:calc(100% + 80px);margin:auto -40px -40px;padding:30px 40px 36px;border-top:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.012),transparent 40%),var(--ink);box-shadow:inset 0 1px 0 rgba(255,255,255,.08);text-align:center}
  .site-footer::before{content:"";position:absolute;inset:0 0 auto;height:1px;background:linear-gradient(90deg,transparent,rgba(0,184,136,.5),transparent);opacity:.6}
  .site-footer img{height:26px!important;margin:0 auto 16px!important;mix-blend-mode:screen}
  .foot-links{display:inline-flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:18px;font-family:"Archivo",sans-serif;font-size:13px;font-weight:500}
  .foot-links a{color:var(--muted);text-decoration:none;transition:color .2s var(--ease)}
  .foot-links a:hover{color:var(--paper)}
  .site-footer .foot-meta{margin-top:16px;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.04em;color:#7C7E78;line-height:1.9}
  .site-footer .foot-meta .pk{color:var(--emerald-soft)}

  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto!important}}
  
    /* ===== Liquid Glass (iOS-26-Anlehnung) · Nav · Menue · Buttons · Cards · LG-INJECT ===== */
  @supports ((-webkit-backdrop-filter:blur(1px)) or (backdrop-filter:blur(1px))){
    .bar, header.top{
      -webkit-backdrop-filter:blur(22px) saturate(185%);
      backdrop-filter:blur(22px) saturate(185%);
      background:radial-gradient(130% 180% at 12% -50%,rgba(255,255,255,.10),transparent 46%),linear-gradient(180deg,rgba(11,19,16,.68),rgba(7,11,14,.55));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 1px 0 rgba(0,0,0,.22),0 16px 36px -26px rgba(0,0,0,.85);
    }
    .mobile-menu{
      -webkit-backdrop-filter:blur(26px) saturate(180%);
      backdrop-filter:blur(26px) saturate(180%);
      background:radial-gradient(120% 80% at 18% 0%,rgba(255,255,255,.08),transparent 48%),linear-gradient(180deg,rgba(12,20,17,.78),rgba(7,11,14,.72));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.16);
    }
    .nav-cta,.m-cta{-webkit-backdrop-filter:blur(16px) saturate(170%);backdrop-filter:blur(16px) saturate(170%)}
  }
  .nav-cta{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.035));border-color:rgba(255,255,255,.18);box-shadow:inset 0 1px 0 rgba(255,255,255,.24),0 8px 22px -16px rgba(0,0,0,.7)}
  .nav-cta:hover{background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.06));border-color:rgba(0,184,136,.45);box-shadow:inset 0 1px 0 rgba(255,255,255,.3),0 10px 26px -14px rgba(0,184,136,.4);transform:translateY(-1px)}
  .nav-cta:active{transform:scale(.97)}
  .cell,.panel,.band,.wd,.faq details,.card{box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 18px 44px -28px rgba(0,0,0,.72)}
  .btn-primary{box-shadow:0 16px 38px -12px rgba(0,184,136,.6),0 16px 38px -16px rgba(31,166,224,.45),inset 0 1px 0 rgba(255,255,255,.45)}
  </style>
</head>
<body>
  <img class="logo" src="/assets/wordmark.png" alt="social2scale">
  <span class="code">404</span>
  <h1>Diese Seite gibt's <em>nicht</em>.</h1>
  <p>Vielleicht hat sich ein Tippfehler eingeschlichen — oder die Seite ist umgezogen.</p>
  <a class="btn" href="/">Zur Startseite →</a>

  <footer class="site-footer">
    <a class="brand" href="/" aria-label="social2scale — zur Startseite"><img src="/assets/s2s-t.png" alt="social2scale" width="52" height="26"></a>
    <nav class="foot-links" aria-label="Rechtliche Seiten &amp; Kontakt">
      <a href="/impressum/">Impressum</a>
      <a href="/datenschutz/">Datenschutz</a>
      <a href="mailto:info@social2scale.com">info@social2scale.com</a>
    </nav>
    <p class="foot-meta">© <span id="yr"></span> social2scale</p>
  </footer>
  <script>document.getElementById('yr').textContent=new Date().getFullYear();</script>

  <!-- back-to-top (global) -->
  <button id="toTop" class="to-top" type="button" aria-label="Nach oben scrollen" hidden><svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M12 19V5M6 11l6-6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  <style>
  .to-top{position:fixed;right:clamp(16px,3vw,28px);bottom:clamp(16px,3vw,28px);z-index:90;width:44px;height:44px;display:grid;place-items:center;border:1px solid var(--line-2,rgba(255,255,255,.12));border-radius:50%;background:linear-gradient(180deg,rgba(20,21,24,.92),rgba(10,11,13,.86));-webkit-backdrop-filter:blur(10px) saturate(140%);backdrop-filter:blur(10px) saturate(140%);color:var(--paper,#F2F3F1);cursor:pointer;opacity:0;transform:translateY(12px) scale(.92);transition:opacity .3s var(--ease,cubic-bezier(.16,1,.3,1)),transform .3s var(--ease,cubic-bezier(.16,1,.3,1)),border-color .25s,box-shadow .25s;box-shadow:0 10px 30px -12px rgba(0,0,0,.7);pointer-events:none}
  .to-top.show{opacity:1;transform:none;pointer-events:auto}
  .to-top:hover{border-color:rgba(0,184,136,.55);box-shadow:0 14px 36px -10px rgba(0,184,136,.45),0 10px 30px -12px rgba(0,0,0,.7);transform:translateY(-2px)}
  .to-top:focus-visible{outline:2px solid var(--emerald,#00B888);outline-offset:3px}
  @media (prefers-reduced-motion:reduce){.to-top{transition:opacity .2s}.to-top.show{transform:none}.to-top:hover{transform:none}}
  </style>
  <script>
  (function(){var b=document.getElementById('toTop');if(!b)return;b.hidden=false;var rm=matchMedia('(prefers-reduced-motion: reduce)').matches;var t=false;
    function upd(){if(window.pageYOffset>480)b.classList.add('show');else b.classList.remove('show');}
    window.addEventListener('scroll',function(){if(!t){requestAnimationFrame(function(){upd();t=false;});t=true;}},{passive:true});
    b.addEventListener('click',function(){window.scrollTo({top:0,behavior:rm?'auto':'smooth'});});
    upd();
  })();
  </script>
</body>
</html>
