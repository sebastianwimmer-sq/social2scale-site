<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden}
.pfp{width:1080px;height:1080px;position:relative;display:grid;place-items:center;
  background:linear-gradient(135deg,#00C293 0%,#12B7B4 46%,#28A9E4 100%)}
.plate{position:absolute;inset:16%;border-radius:24%;
  background:linear-gradient(150deg,rgba(6,20,22,.42),rgba(6,20,22,.18));
  border:1px solid rgba(255,255,255,.20);
  box-shadow:inset 0 2px 0 rgba(255,255,255,.28),0 60px 130px -50px rgba(0,0,0,.55)}
.logo{position:relative;z-index:2;width:52%;filter:drop-shadow(0 10px 26px rgba(0,0,0,.45))}
</style></head><body>
<div class="pfp"><div class="plate"></div>
<img class="logo" src="file:///Users/sebastianwimmer/social2scale-site/assets/s2s-t.png"></div>
</body></html>
